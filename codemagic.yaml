workflows:
  android-apk-build:
    name: GovTaskAI Production APK Build
    max_build_duration: 10
    instance_type: mac_mini_m2
    environment:
      vars:
        JAVA_VERSION: "17"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Locate Project and Build APK
        script: |
          # Find the exact folder containing your build instructions
          TARGET_DIR=$(find . -name "build.gradle" -not -path "*/.*" | head -n 1 | xargs dirname)
          echo "Target building directory set to: $TARGET_DIR"
          cd "$TARGET_DIR"
          
          # Force generate the wrapper if it wasn't pushed to GitHub
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi
          
          chmod +x gradlew
          
          # Execute the direct compilation step right here
          ./gradlew assembleRelease
    artifacts:
      - "**/build/outputs/apk/release/*.apk"
    publishing:
      email:
        recipients:
          - rajibulalvi2@gmail.com
