workflows:
  android-apk-build:
    name: GovTaskAI Production APK Build
    max_build_duration: 10
    instance_type: mac_mini_m2
    environment:
      vars:
        JAVA_VERSION: "17"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Locate Android Directory and Fix Wrapper
        script: |
          # Find where the android build files are sitting
          ANDROID_DIR=$(find . -name "build.gradle" -not -path "*/.*" | head -n 1 | xargs dirname)
          echo "Android project located at: $ANDROID_DIR"
          cd $ANDROID_DIR
          
          # If gradlew wrapper is missing, generate it automatically
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi
          chmod +x gradlew
          echo "PROJECT_DIR=$PWD" >> $CM_ENV
      - name: Build Android Release APK
        script: |
          cd $PROJECT_DIR
          ./gradlew assembleRelease
    artifacts:
      - "**/build/outputs/apk/release/*.apk"
    publishing:
      email:
        recipients:
          - rajibulalvi2@gmail.com
