workflows:
  android-apk-build:
    name: GovTaskAI Production APK Build
    max_build_duration: 10
    instance_type: mac_mini_m2
    environment:
      vars:
        JAVA_VERSION: "17"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Locate Project and Build APK
        script: |
          # 1. Force generate the correct 9.3.1 wrapper at the root level
          echo "Configuring Gradle 9.3.1 environment at root..."
          gradle wrapper --gradle-version 9.3.1
          
          # 2. Create the exact missing keystore file to satisfy the compiler requirements
          echo "Generating temporary local build signature..."
          keytool -genkeypair -v \
            -keystore /Users/builder/clone/debug.keystore \
            -alias androiddebugkey \
            -keypass android \
            -storepass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          
          # 3. Find where your actual app modules live
          TARGET_DIR=$(find . -name "build.gradle*" -not -path "*/.*" | head -n 1 | xargs dirname)
          echo "Target app module located at: $TARGET_DIR"
          
          # 4. Ensure execution permissions are bound to the wrapper script
          chmod +x ./gradlew
          
          # 5. Compile the application into your installable APK package
          echo "Starting application compilation..."
          ./gradlew assembleDebug
    artifacts:
      - "**/build/outputs/apk/debug/*.apk"
    publishing:
      email:
        recipients:
          - rajibulalvi2@gmail.com
