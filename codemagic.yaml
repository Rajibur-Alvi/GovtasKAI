workflows:
  android-apk-build:
    name: GovTaskAI Production APK Build
    max_build_duration: 10
    instance_type: mac_mini_m2
    environment:
      vars:
        JAVA_VERSION: "17"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Locate Project and Build APK
        script: |
          # 1. Force generate the correct 9.3.1 wrapper at the root level first
          echo "Configuring Gradle 9.3.1 environment at root..."
          gradle wrapper --gradle-version 9.3.1
          
          # 2. Find where your actual app modules live
          TARGET_DIR=$(find . -name "build.gradle*" -not -path "*/.*" | head -n 1 | xargs dirname)
          echo "Target app module located at: $TARGET_DIR"
          
          # 3. Ensure execution permissions are bound to the wrapper script
          chmod +x ./gradlew
          
          # 4. Compile the application as a standard installable APK
          echo "Starting application compilation..."
          ./gradlew assembleDebug
    artifacts:
      - "**/build/outputs/apk/debug/*.apk"
    publishing:
      email:
        recipients:
          - rajibulalvi2@gmail.com
