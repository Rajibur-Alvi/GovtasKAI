workflows:
  android-apk-build:
    name: GovTaskAI Production APK Build
    max_build_duration: 15
    instance_type: mac_mini_m2
    environment:
      vars:
        JAVA_VERSION: "17"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Configure Environment and Compile Bangladesh Production APK
        script: |
          # 1. Force generate the correct 9.3.1 wrapper at the root level
          echo "Configuring Gradle 9.3.1 environment..."
          gradle wrapper --gradle-version 9.3.1
          
          # 2. Generate the required local build signature properties
          echo "Generating local build signature..."
          keytool -genkeypair -v \
            -keystore /Users/builder/clone/debug.keystore \
            -alias androiddebugkey \
            -keypass android \
            -storepass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          
          # 3. Locate the app directory dynamically
          TARGET_DIR=$(find . -name "build.gradle*" -not -path "*/.*" | head -n 1 | xargs dirname)
          echo "Target app module located at: $TARGET_DIR"
          
          # 4. Grant full execution permissions
          chmod +x ./gradlew
          
          # 5. Compile the live Bangladesh-localized application binary
          echo "Compiling clean production layouts..."
          ./gradlew assembleDebug --no-daemon --stacktrace
    artifacts:
      - "**/build/outputs/apk/debug/*.apk"
    publishing:
      email:
        recipients:
          - rajibulalvi2@gmail.com
